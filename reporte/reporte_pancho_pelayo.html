<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f9f8fb" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#121016" media="(prefers-color-scheme: dark)">
<title>Análisis de publicaciones — Pancho Pelayo · Púrpura</title>
<style>
  :root {
    color-scheme: light;
    --surface-1: #fcfcfd; --page: #f9f8fb;
    --ink-1: #131118; --ink-2: #55515e; --ink-3: #8b8794;
    --grid: #e5e2ec; --axis: #c6c2d1; --border: rgba(19,17,24,.10);
    /* identidad Púrpura (validada con el logo #684d9b) */
    --brand: #684d9b; --brand-suave: rgba(104,77,155,.10);
    --pos: #684d9b; --neg: #e34948; --neu: #d9d6e0;
    --seq-1: #4a3572; --seq-2: #684d9b; --seq-3: #8163b4; --seq-4: #9d87d3;
    --good: #0ca30c; --crit: #d03b3b; --chip: #efedf4;
    --logo-chip: transparent;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --surface-1: #1b1922; --page: #121016;
      --ink-1: #ffffff; --ink-2: #c5c1cf; --ink-3: #8b8794;
      --grid: #2d2a37; --axis: #3b3846; --border: rgba(255,255,255,.10);
      --brand: #8f76cb; --brand-suave: rgba(143,118,203,.16);
      --pos: #8f76cb; --neg: #e66767; --neu: #45424f;
      --seq-1: #ab97dd; --seq-2: #8f76cb; --seq-3: #7d63b3; --seq-4: #684d9b;
      --chip: #262330;
      --logo-chip: #f5f3f8;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page); color: var(--ink-1); line-height: 1.5;
    padding: 20px max(14px, env(safe-area-inset-left)) 64px max(14px, env(safe-area-inset-right));
    -webkit-tap-highlight-color: transparent;
  }
  .wrap { max-width: 1080px; margin: 0 auto; }
  header.principal { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  header.principal img.logo { height: 42px; width: auto; background: var(--logo-chip); border-radius: 8px; padding: 4px 8px; }
  header.principal .tt { min-width: 0; flex: 1; }
  header.principal h1 { font-size: clamp(19px, 4.5vw, 26px); letter-spacing: -.01em; line-height: 1.25; }
  header.principal p { color: var(--ink-2); font-size: 13.5px; margin-top: 2px; }
  .filtros { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0 24px; }
  .filtros button {
    border: 1px solid var(--border); background: var(--surface-1); color: var(--ink-2);
    border-radius: 999px; padding: 8px 14px; font-size: 13px; cursor: pointer; font-family: inherit;
    white-space: nowrap; touch-action: manipulation; min-height: 36px; flex: 0 0 auto; transition: border-color .12s, color .12s;
  }
  .filtros button:hover { border-color: var(--brand); color: var(--ink-1); }
  .filtros button.activo { background: var(--brand); color: #fff; border-color: var(--brand); font-weight: 600; }
  .filtros select {
    display: none; width: 100%; min-height: 44px; font: inherit; font-size: 14px;
    color: var(--ink-1); background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 12px; padding: 8px 12px; touch-action: manipulation;
  }
  @media (max-width: 640px) {
    .filtros button { display: none; }
    .filtros select { display: block; }
  }
  :is(button, a):focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; border-radius: 6px; }
  a { color: var(--brand); }
  a:hover { text-decoration-thickness: 2px; }
  .grid-tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .tile { background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; padding: 13px 15px; display: flex; gap: 11px; align-items: flex-start; min-width: 0; }
  .tile .ic { flex: 0 0 auto; width: 34px; height: 34px; border-radius: 9px; background: var(--brand-suave); color: var(--brand); display: grid; place-items: center; }
  .tile .ic svg { width: 18px; height: 18px; }
  .tile .v { font-size: clamp(19px, 2.6vw, 24px); font-weight: 650; letter-spacing: -.02em; }
  .tile .l { font-size: 12.5px; color: var(--ink-2); }
  .tile .sub { font-size: 11.5px; color: var(--ink-3); }
  .card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 16px; padding: 18px clamp(14px, 2.5vw, 22px); margin-bottom: 16px; }
  .card > h2 { font-size: 15.5px; display: flex; align-items: center; gap: 9px; margin-bottom: 4px; }
  .card > h2 .hic { width: 28px; height: 28px; border-radius: 8px; background: var(--brand-suave); color: var(--brand); display: grid; place-items: center; flex: 0 0 auto; }
  .card > h2 .hic svg { width: 15px; height: 15px; }
  .card .desc { font-size: 13px; color: var(--ink-2); margin-bottom: 14px; }
  .dos-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
  @media (max-width: 760px) { .dos-col { grid-template-columns: 1fr; } }
  /* barras responsivas (HTML, no SVG: el texto nunca se encoge) */
  .fila-barra { display: grid; grid-template-columns: minmax(120px, 220px) 1fr max-content; gap: 10px; align-items: center; margin-bottom: 9px; min-width: 0; }
  .fila-barra .nom { font-size: 13px; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fila-barra .pista { background: transparent; border-radius: 5px; height: 20px; position: relative; min-width: 0; }
  .fila-barra .barra { height: 100%; border-radius: 5px; background: var(--seq-2); min-width: 3px; transition: opacity .12s; }
  .fila-barra:hover .barra { opacity: .85; }
  .fila-barra .val { font-size: 12.5px; font-weight: 600; font-variant-numeric: tabular-nums; }
  @media (max-width: 560px) {
    .fila-barra { grid-template-columns: 1fr max-content; grid-template-areas: "nom val" "pista pista"; row-gap: 3px; margin-bottom: 12px; }
    .fila-barra .nom { grid-area: nom; } .fila-barra .pista { grid-area: pista; } .fila-barra .val { grid-area: val; }
  }
  .apilada { display: flex; gap: 2px; height: 20px; border-radius: 5px; overflow: hidden; min-width: 0; }
  .apilada > div { min-width: 3px; }
  .leyenda { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12.5px; color: var(--ink-2); margin-bottom: 12px; }
  .leyenda span { display: inline-flex; align-items: center; gap: 6px; }
  .leyenda i { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
  .nube { position: relative; width: 100%; overflow: hidden; }
  .nube span { position: absolute; line-height: 1; white-space: nowrap; transform: translate(-50%, -50%); }
  .lista-items { list-style: none; display: flex; flex-direction: column; gap: 11px; padding: 0; }
  .lista-items li { border-left: 3px solid var(--grid); padding: 2px 0 2px 12px; font-size: 14px; overflow-wrap: anywhere; }
  .lista-items li .ej { display: block; color: var(--ink-3); font-size: 13px; font-style: italic; margin-top: 2px; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; background: var(--chip); color: var(--ink-2); margin-left: 6px; vertical-align: middle; white-space: nowrap; }
  .badge.alta { color: var(--crit); }
  .badge.pos { color: var(--pos); }
  .badge.neg { color: var(--neg); }
  /* comentarios con perfil */
  .coment { border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; font-size: 14px; display: flex; gap: 11px; }
  .coment .avatar {
    flex: 0 0 auto; width: 38px; height: 38px; border-radius: 50%; background: var(--brand-suave); color: var(--brand);
    display: grid; place-items: center; font-size: 13px; font-weight: 700; letter-spacing: .02em;
  }
  .coment .cuerpo { min-width: 0; flex: 1; }
  .coment .quien { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 2px; }
  .coment .quien a, .coment .quien b { font-size: 13.5px; font-weight: 650; color: var(--ink-1); text-decoration: none; }
  .coment .quien a:hover { color: var(--brand); text-decoration: underline; }
  .coment .txt { overflow-wrap: anywhere; }
  .coment .m { color: var(--ink-3); font-size: 12px; margin-top: 6px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .coment .m svg { width: 13px; height: 13px; vertical-align: -2px; }
  .post-head h2 { font-size: clamp(17px, 3.5vw, 20px); }
  .post-head .meta { font-size: 13px; color: var(--ink-2); display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 6px; align-items: center; }
  .texto-post { font-size: 13.5px; color: var(--ink-2); white-space: pre-wrap; border-left: 3px solid var(--brand); padding-left: 12px; margin-top: 12px; max-height: 138px; overflow: hidden auto; overflow-wrap: anywhere; }
  .alerta { display: flex; gap: 11px; align-items: flex-start; font-size: 14px; }
  .alerta .ic { flex: 0 0 auto; width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center; }
  .alerta .ic svg { width: 18px; height: 18px; }
  .alerta.ok .ic { background: rgba(12,163,12,.12); color: var(--good); }
  .alerta.mal .ic { background: rgba(208,59,59,.12); color: var(--crit); }
  .scroll-x { overflow-x: auto; }
  table.tabla-narr { width: 100%; border-collapse: collapse; font-size: 13.5px; min-width: 560px; }
  table.tabla-narr th { text-align: left; color: var(--ink-2); font-weight: 600; font-size: 12.5px; border-bottom: 1px solid var(--grid); padding: 6px 8px; }
  table.tabla-narr td { padding: 7px 8px; border-bottom: 1px solid var(--grid); font-variant-numeric: tabular-nums; }
  table.tabla-narr tr:last-child td { border-bottom: none; }
  .tooltip {
    position: fixed; pointer-events: none; background: var(--ink-1); color: var(--page);
    font-size: 12.5px; padding: 6px 10px; border-radius: 8px; opacity: 0; transition: opacity .12s; z-index: 50; max-width: 260px;
  }
  .num { font-variant-numeric: tabular-nums; }
  footer { color: var(--ink-3); font-size: 12px; margin-top: 28px; }
  .oculto { display: none; }
</style>
</head>

, ["pues", 20], ["soy", 20], ["san", 19], ["millones", 19], ["cuenta", 19], ["urge", 19], ["hacer", 18], ["vez", 18], ["cada", 18]], "resumen_ejecutivo": ["Las 11 publicaciones acumulan 20,033 reacciones, 2,321 comentarios (1,862 analizados uno por uno) y 2,871 compartidos. El sentimiento global es 60% positivo, 23% negativo y 17% neutro: una conversación dominada por la base de apoyo rumbo a 2027, con una oposición orgánica (mayormente pro-Morena) que disputa los hilos más visibles pero no controla la narrativa.", "El comparativo de narrativas muestra un intercambio claro entre alcance y afinidad. El contraste (SICT, huachicol) es el motor de volumen: 4,887 interacciones promedio por post, casi 10 veces más que cercanía, impulsado por el agravio compartido de las carreteras; pero es también la narrativa con el sentimiento más frágil (54.8% positivo) porque activa el contraataque (“pura lengua, anda en campaña”). En el otro extremo, cercanía e identidad sudcaliforniana generan la mejor calidad de conversación (65–66% positivo, y el único post sin un solo comentario negativo: Colonia Olivos) aunque con alcance limitado a la base dura. El liderazgo (lanzamiento y superación personal) equilibra ambos mundos: 3,506 interacciones promedio con 62% positivo.", "Lo que la gente le reconoce a Pancho: valentía para alzar la voz ante la federación, cercanía con la gente (“mi gallo Panchito”), perseverancia y experiencia de gobierno. Las críticas recurrentes que requieren gestión: oportunismo electoral, su gestión como alcalde de Comondú, la resistencia a la marca PAN, y —la crítica individual con más likes de todo el paquete— el señalamiento de acaparamiento de agua para sus ranchos.", "Sobre ataques orquestados: solo el reel de salida “Yo quiero” presenta indicios moderados de semi-coordinación (textos casi calcados entre cuentas distintas, una cuenta repitiendo 4 veces la misma burla y una oleada tardía de comentarios negativos idénticos sin likes). En las otras 10 publicaciones la crítica es orgánica, dispersa y de bajo volumen. No hay evidencia de una operación sistemática en su contra."], "recomendaciones": ["Mantener el contraste como motor de alcance, pero cerrar cada pieza de denuncia con una propuesta concreta y verificable: la crítica más repetida y con más tracción es “propón en vez de atacar / anda en campaña”.", "Preparar de inmediato una respuesta documentada al tema del agua y los ranchos: es la crítica individual con más likes (43) del paquete y hoy no tiene contranarrativa; si escala, contamina la narrativa de cercanía.", "Blindar el flanco Comondú con resultados tangibles de su gestión como alcalde (obras, cifras, testimonios), pues es el ataque retrospectivo más frecuente de los detractores.", "Escalar el formato testimonial de cercanía a video: el testimonio de los medicamentos fue el activo más persuasivo del paquete; además, convertir las peticiones ciudadanas que emergen en los comentarios (hemodiálisis, extorsión policial) en contenido de gestión y respuesta.", "Apalancar el apoyo transversal detectado (“no soy panista, pero tiene razón”): construir la causa —carreteras, recursos federales— por encima del partido, porque la marca PAN genera más resistencia que la figura de Pancho.", "Verificar el historial de los validadores visibles antes de cada colaboración: el pasado morenista del aliado en Cabo San Lucas fue el principal ruido de esa pieza.", "Monitorear (sin confrontar) las cuentas del patrón semi-coordinado del reel de salida y guardar evidencia; si el patrón se repite en próximos lanzamientos, escalar a denuncia de comportamiento inauténtico ante Meta.", "Mezcla editorial sugerida: 2 piezas de contraste por semana para alcance + 1–2 de cercanía/identidad para afinidad y sentimiento, evitando depender solo del contraste porque erosiona el % positivo (54.8% vs 66.1%)."]};

// ---------- tooltip (solo puntero fino; en táctil no hay hover) ----------
const tip = $("#tooltip");
const hayHover = matchMedia("(hover: hover)").matches;
function conTooltip(el, html) {
  if (!hayHover) { el.title = html.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim(); return; }
  el.addEventListener("mousemove", e => {
    tip.innerHTML = html; tip.style.opacity = 1;
    tip.style.left = Math.min(e.clientX + 14, innerWidth - 280) + "px";
    tip.style.top = (e.clientY + 14) + "px";
  });
  el.addEventListener("mouseleave", () => tip.style.opacity = 0);
}

// ---------- barras horizontales responsivas ----------
function barrasH(filas, { fmtV = fmt, colorVar = "--seq-2" } = {}) {
  const maxV = Math.max(...filas.map(f => f.v), 1);
  const cont = document.createElement("div");
  filas.forEach(f => {
    const fila = document.createElement("div");
    fila.className = "fila-barra";
    fila.innerHTML = `<div class="nom">${esc(f.n)}</div>
      <div class="pista"><div class="barra" style="width:${Math.max(2, 100 * f.v / maxV)}%;${f.color ? `background:${f.color}` : `background:var(${colorVar})`}"></div></div>
      <div class="val num">${fmtV(f.v)}</div>`;
    conTooltip(fila.querySelector(".pista"), `<b>${esc(f.n)}</b><br>${fmtV(f.v)}`);
    cont.appendChild(fila);
  });
  return cont;
}

// ---------- barra apilada de sentimiento ----------
function barraSentimiento(sent, alto) {
  const total = Math.max(1, sent.positivo + sent.negativo + sent.neutro);
  const segs = [
    { k: "Positivo", v: sent.positivo, c: "var(--pos)" },
    { k: "Neutro", v: sent.neutro, c: "var(--neu)" },
    { k: "Negativo", v: sent.negativo, c: "var(--neg)" },
  ];
  const cont = document.createElement("div");
  cont.className = "apilada";
  if (alto) cont.style.height = alto;
  segs.forEach(s => {
    if (!s.v) return;
    const d = document.createElement("div");
    d.style.cssText = `width:${(100 * s.v / total)}%;background:${s.c};`;
    conTooltip(d, `<b>${s.k}</b><br>${fmt(s.v)} comentarios (${(100 * s.v / total).toFixed(1)}%)`);
    cont.appendChild(d);
  });
  return cont;
}

function sentimientoPorPost(posts) {
  const cont = document.createElement("div");
  posts.forEach(p => {
    const fila = document.createElement("div");
    fila.className = "fila-barra";
    const nom = document.createElement("div");
    nom.className = "nom";
    nom.textContent = p.titulo_corto;
    const pista = document.createElement("div");
    pista.className = "pista";
    pista.style.height = "20px";
    pista.appendChild(barraSentimiento(p.sentimiento));
    const val = document.createElement("div");
    val.className = "val num";
    val.textContent = p.pct_positivo + "%";
    fila.append(nom, pista, val);
    cont.appendChild(fila);
  });
  return cont;
}

// ---------- gráfica temporal (columnas por hora/día) ----------
const fmtBucket = (k, unidad) => {
  const d = new Date(unidad === "hora" ? k.replace(" ", "T") + ":00" : k + "T12:00:00");
  const dia = new Intl.DateTimeFormat("es-MX", { day: "numeric", month: "short" }).format(d);
  return unidad === "hora" ? `${dia}, ${String(d.getHours()).padStart(2, "0")}:00` : dia;
};
function graficaTemporal(serie) {
  const cont = document.createElement("div");
  const buckets = (serie && serie.buckets) || [];
  if (!buckets.length) { cont.textContent = "Sin datos de tiempo disponibles."; return cont; }
  const maxV = Math.max(...buckets.map(b => b[1]), 1);
  const zona = document.createElement("div");
  zona.style.cssText = "display:flex;align-items:flex-end;gap:1px;height:120px;border-bottom:1px solid var(--axis);";
  buckets.forEach(([k, v]) => {
    const col = document.createElement("div");
    col.style.cssText = `flex:1 1 0;min-width:2px;height:${Math.max(v ? 3 : 0, 100 * v / maxV)}%;background:var(--seq-2);border-radius:2px 2px 0 0;`;
    conTooltip(col, `<b>${fmtBucket(k, serie.unidad)}</b><br>${fmt(v)} comentario${v === 1 ? "" : "s"}`);
    zona.appendChild(col);
  });
  cont.appendChild(zona);
  const ejes = document.createElement("div");
  ejes.style.cssText = "display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-3);margin-top:4px;";
  const medio = buckets[Math.floor(buckets.length / 2)];
  ejes.innerHTML = `<span>${fmtBucket(buckets[0][0], serie.unidad)}</span>` +
    (buckets.length > 2 ? `<span>${fmtBucket(medio[0], serie.unidad)}</span>` : "") +
    `<span>${fmtBucket(buckets[buckets.length - 1][0], serie.unidad)}</span>`;
  cont.appendChild(ejes);
  return cont;
}

// ---------- nube de palabras (colocación en espiral, forma de nube) ----------
function nube(palabras, n = 40) {
  const cont = document.createElement("div");
  cont.className = "nube";
  const lista = palabras.slice(0, n);
  if (!lista.length) return cont;
  const maxF = lista[0][1], minF = lista[lista.length - 1][1];
  const vars = ["--seq-1", "--seq-2", "--seq-3", "--seq-4"];
  // se coloca cuando la tarjeta ya tiene ancho real
  requestAnimationFrame(() => {
    const W = cont.clientWidth || 600;
    const esMovil = W < 520;
    const H = esMovil ? 240 : 300;
    cont.style.height = H + "px";
    const cx = W / 2, cy = H / 2, aspecto = W / H;
    const puestos = [];
    const choca = r => r.x < 0 || r.y < 2 || r.x + r.w > W || r.y + r.h > H - 2 ||
      puestos.some(q => r.x < q.x + q.w + 4 && q.x < r.x + r.w + 4 && r.y < q.y + q.h + 2 && q.y < r.y + r.h + 2);
    lista.forEach(([w, f], i) => {
      const t = (f - minF) / Math.max(1, maxF - minF);
      const sp = document.createElement("span");
      sp.style.fontSize = ((esMovil ? 11 : 13) + t * (esMovil ? 22 : 30)) + "px";
      sp.style.fontWeight = t > .5 ? 700 : 500;
      sp.style.color = `var(${vars[t > .75 ? 0 : t > .5 ? 1 : t > .25 ? 2 : 3]})`;
      sp.style.visibility = "hidden";
      sp.textContent = w;
      cont.appendChild(sp);
      const w2 = sp.offsetWidth, h2 = sp.offsetHeight;
      // espiral de Arquímedes desde el centro (elíptica según el aspecto del contenedor)
      let colocado = false;
      for (let a = 0; a < 220; a++) {
        const ang = 0.6 * a + (i % 6);
        const rad = 2.2 * a * 0.6;
        const x = cx + rad * Math.cos(ang) * Math.min(aspecto * .55, 2.2);
        const y = cy + rad * Math.sin(ang);
        const rect = { x: x - w2 / 2, y: y - h2 / 2, w: w2, h: h2 };
        if (!choca(rect)) {
          sp.style.left = x + "px";
          sp.style.top = y + "px";
          sp.style.visibility = "visible";
          puestos.push(rect);
          colocado = true;
          break;
        }
      }
      if (!colocado) sp.remove();
      else conTooltip(sp, `<b>${esc(w)}</b><br>${fmt(f)} menciones`);
    });
  });
  return cont;
}

// ---------- navegación ----------
function render(vista) {
  const main = $("#contenido");
  main.innerHTML = "";
  document.querySelectorAll(".filtros button").forEach(b => {
    b.classList.toggle("activo", b.dataset.v === vista);
    b.setAttribute("aria-pressed", String(b.dataset.v === vista));
  });
  const sel = $("#selector-post");
  if (sel) sel.value = vista;
  if (vista === "__consolidado__") main.appendChild(vistaConsolidada());
  else main.appendChild(vistaPost(DATA.posts.find(p => p.clave === vista)));
  window.scrollTo({ top: 0 });
}

    b.textContent = p.titulo_corto;
    b.dataset.v = p.clave;
    b.onclick = () => render(p.clave);
    nav.appendChild(b);
  });
  // en pantallas chicas los chips se sustituyen por un selector nativo (sin scroll)
  const sel = document.createElement("select");
  sel.id = "selector-post";
  sel.setAttribute("aria-label", "Seleccionar publicación");
  sel.innerHTML = `<option value="__consolidado__">Consolidado</option>` +
    DATA.posts.map(p => `<option value="${p.clave}">${esc(p.titulo_corto)}</option>`).join("");
  sel.onchange = () => render(sel.value);
  nav.appendChild(sel);
  $("#pie").textContent = "Elaborado por Púrpura Solutions. Fuente: Facebook vía Apify (facebook-posts-scraper y facebook-comments-scraper). Sentimiento y temas clasificados con IA (Claude). Los conteos de comentarios de Facebook incluyen comentarios borrados o filtrados que no son visibles públicamente.";
  render("__consolidado__");
}
init();
</script>
</body>
</html>
